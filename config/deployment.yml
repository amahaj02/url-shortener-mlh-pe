apiVersion: apps/v1
kind: Deployment
metadata:
    name: url-shortener
    labels:
        app: url-shortener
spec:
    replicas: 3
    selector:
        matchLabels:
            app: url-shortener
    strategy:
        rollingUpdate:
            maxSurge: 0
            maxUnavailable: 1
    minReadySeconds: 5
    template:
        metadata:
            labels:
                app: url-shortener
        spec:
            automountServiceAccountToken: false
            terminationGracePeriodSeconds: 30
            affinity:
                podAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                        - weight: 100
                          podAffinityTerm:
                              labelSelector:
                                  matchLabels:
                                      app: url-shortener
                              topologyKey: kubernetes.io/hostname
            containers:
                - name: url-shortener
                  image: <IMAGE>
                  imagePullPolicy: Always
                  securityContext:
                      allowPrivilegeEscalation: false
                      runAsNonRoot: true
                      runAsUser: 10001
                      runAsGroup: 10001
                      readOnlyRootFilesystem: false
                  ports:
                      - name: http
                        containerPort: 8000
                  envFrom:
                      - secretRef:
                            name: url-shortener-env
                  env:
                      - name: FLASK_DEBUG
                        value: "false"
                      - name: TESTING
                        value: "false"
                      - name: AUTO_CREATE_TABLES
                        value: "false"
                      - name: GUNICORN_BIND
                        value: "0.0.0.0:8000"
                      - name: PORT
                        value: "8000"
                      - name: HOME
                        value: "/tmp"
                      - name: GUNICORN_TIMEOUT
                        value: "60"
                      - name: GUNICORN_GRACEFUL_TIMEOUT
                        value: "60"
                      - name: GUNICORN_MAX_REQUESTS
                        value: "0"
                      - name: GUNICORN_LOG_LEVEL
                        value: "info"
                      - name: DATABASE_MAX_CONNECTIONS
                        value: "2"
                      - name: DATABASE_POOL_RESERVED_CONNECTIONS
                        value: "1"
                      - name: WEB_CONCURRENCY
                        value: "1"
                      - name: GUNICORN_THREADS
                        value: "2"
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 6
                  startupProbe:
                      httpGet:
                          path: /health
                          port: http
                      periodSeconds: 5
                      timeoutSeconds: 5
                      failureThreshold: 24
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: http
                      initialDelaySeconds: 60
                      periodSeconds: 20
                      timeoutSeconds: 5
                      failureThreshold: 8
                  resources:
                      requests:
                          cpu: 400m
                          memory: 768Mi
                      limits:
                          cpu: "600m"
                          memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
    name: url-shortener-service
spec:
    type: LoadBalancer
    ports:
        - name: http
          protocol: TCP
          port: 80
          targetPort: http
    selector:
        app: url-shortener
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: url-shortener-hpa
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: url-shortener
    minReplicas: 2
    maxReplicas: 7
    behavior:
        scaleUp:
            stabilizationWindowSeconds: 0
            policies:
                - type: Pods
                  value: 1
                  periodSeconds: 30
                - type: Percent
                  value: 100
                  periodSeconds: 30
            selectPolicy: Max
        scaleDown:
            stabilizationWindowSeconds: 120
            policies:
                - type: Percent
                  value: 50
                  periodSeconds: 60
    metrics:
        - type: Resource
          resource:
              name: cpu
              target:
                  type: Utilization
                  averageUtilization: 70
