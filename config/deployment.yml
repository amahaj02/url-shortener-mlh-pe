apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
  labels:
    app: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: url-shortener
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: url-shortener
          image: <IMAGE>
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: FLASK_DEBUG
              value: "false"
            - name: TESTING
              value: "false"
            - name: AUTO_CREATE_TABLES
              value: "false"
            - name: GUNICORN_BIND
              value: "0.0.0.0:8000"
            - name: PORT
              value: "8000"
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: DATABASE_NAME
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: DATABASE_PORT
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: DATABASE_PASSWORD
            - name: DATABASE_MAX_CONNECTIONS
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: DATABASE_MAX_CONNECTIONS
            - name: DATABASE_POOL_RESERVED_CONNECTIONS
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: DATABASE_POOL_RESERVED_CONNECTIONS
            - name: DATABASE_STALE_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: DATABASE_STALE_TIMEOUT_SECONDS
            - name: DATABASE_POOL_WAIT_TIMEOUT_SECONDS
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secrets
                  key: DATABASE_POOL_WAIT_TIMEOUT_SECONDS
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: url-shortener-service
spec:
  type: LoadBalancer
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
  selector:
    app: url-shortener
