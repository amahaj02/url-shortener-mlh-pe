apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-policies
  namespace: monitoring
data:
  policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: discord-webhook
        group_by:
          - alertname
          - service
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        routes:
          - receiver: discord-webhook
            object_matchers:
              - ["service", "=", "url-shortener"]
