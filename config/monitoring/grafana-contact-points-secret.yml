apiVersion: v1
kind: Secret
metadata:
  name: grafana-alerting-contact-points
  namespace: monitoring
type: Opaque
stringData:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: discord-webhook
        receivers:
          - uid: discord-webhook
            type: webhook
            disableResolveMessage: false
            settings:
              url: <GRAFANA_DISCORD_WEBHOOK_URL>
