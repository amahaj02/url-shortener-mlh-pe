name: Build, test, push, and deploy

on:
    push:
        branches:
            - main
            - scalability/silver
        paths:
            - "app/**"
            - "config/**"
            - "deployment/**"
            - "Dockerfile"
            - "pyproject.toml"
            - "run.py"
            - ".github/workflows/**"
    workflow_dispatch:

concurrency:
    group: k8s-deploy-main
    cancel-in-progress: true

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v6

            - name: Set up Python
              run: uv python install 3.13

            - name: Sync dependencies
              run: uv sync --group dev

            - name: Run tests
              run: uv run pytest

    deploy:
        runs-on: ubuntu-latest
        needs: test
        env:
            IMAGE_TAG: ${{ github.sha }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install doctl
              uses: digitalocean/action-doctl@v2
              with:
                  token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

            - name: Log in to DigitalOcean Container Registry
              run: doctl registry login --expiry-seconds 1200

            - name: Validate registry target
              env:
                  REGISTRY_NAME: ${{ secrets.REGISTRY_NAME }}
              run: |
                  if [ -z "$REGISTRY_NAME" ]; then
                    echo "REGISTRY_NAME GitHub secret is required but not set"
                    exit 1
                  fi
                  case "$REGISTRY_NAME" in
                    registry.digitalocean.com/*) ;;
                    *)
                      echo "REGISTRY_NAME must look like registry.digitalocean.com/<registry-name>"
                      echo "Current value points elsewhere, which causes push auth/scope failures."
                      exit 1
                      ;;
                  esac

            - name: Build container image
              run: docker build -t ${{ secrets.REGISTRY_NAME }}/url-shortener:${GITHUB_SHA::7} .

            - name: Push image to DigitalOcean Container Registry
              run: docker push ${{ secrets.REGISTRY_NAME }}/url-shortener:${GITHUB_SHA::7}

            - name: Save DigitalOcean kubeconfig
              run: doctl kubernetes cluster kubeconfig save --expiry-seconds 600 ${{ secrets.CLUSTER_NAME }}

            - name: Ensure Container Registry pull secret (fixes ErrImagePull 401)
              env:
                  REGISTRY_NAME: ${{ secrets.REGISTRY_NAME }}
              run: |
                  REGISTRY_SHORT="${REGISTRY_NAME##*/}"
                  doctl registry kubernetes-manifest "$REGISTRY_SHORT" --namespace default | kubectl apply -f -

            - name: Create or update application env secret
              env:
                  K8S_ENV_FILE: ${{ secrets.K8S_ENV_FILE }}
              run: |
                  if [ -z "$K8S_ENV_FILE" ]; then
                    echo "K8S_ENV_FILE GitHub secret is required but not set"
                    exit 1
                  fi
                  printf '%s\n' "$K8S_ENV_FILE" > /tmp/app.env
                  kubectl create secret generic url-shortener-env \
                    --namespace=default \
                    --from-env-file=/tmp/app.env \
                    --dry-run=client -o yaml | kubectl apply -f -

            - name: Render deployment manifest
              env:
                  REGISTRY_NAME: ${{ secrets.REGISTRY_NAME }}
              run: |
                  REGISTRY_SHORT="${REGISTRY_NAME##*/}"
                  IMAGE_PULL_SECRET="registry-${REGISTRY_SHORT}"
                  sed -e "s|<IMAGE>|${REGISTRY_NAME}/url-shortener:${GITHUB_SHA::7}|" \
                      -e "s|<IMAGE_PULL_SECRET>|${IMAGE_PULL_SECRET}|" \
                      config/deployment.yml > /tmp/url-shortener-deployment.yml

            - name: Deploy to DigitalOcean Kubernetes
              run: kubectl apply --namespace=default -f /tmp/url-shortener-deployment.yml

            - name: Verify deployment rollout
              run: kubectl rollout status deployment/url-shortener --namespace=default --timeout=180s

            - name: Apply monitoring manifests
              run: kubectl apply -f config/monitoring/url-shortener-monitoring.yml

            - name: Render TLS issuer manifest
              env:
                  LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
              run: |
                  if [ -z "$LETSENCRYPT_EMAIL" ]; then
                    echo "LETSENCRYPT_EMAIL GitHub secret is required but not set"
                    exit 1
                  fi
                  sed -e "s|<LETSENCRYPT_EMAIL>|${LETSENCRYPT_EMAIL}|" \
                      config/letsencrypt-issuer.yml > /tmp/letsencrypt-issuer.yml

            - name: Apply TLS issuer
              run: kubectl apply -f /tmp/letsencrypt-issuer.yml

            - name: Apply application ingress
              run: kubectl apply -f config/app-ingress.yml

            - name: Apply monitoring ingress
              run: kubectl apply -f config/monitoring/monitoring-ingress.yml

            - name: Verify service endpoints
              run: kubectl get service url-shortener-service --namespace=default
